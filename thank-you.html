<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You - Shaswot Bhandari</title>
  <meta name="description" content="Message received confirmation page." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Vercel Speed Insights -->
  <script type="module">
    import { injectSpeedInsights } from 'https://esm.sh/@vercel/speed-insights@2.0.0';
    injectSpeedInsights();
  </script>

  <style>
    :root {
      --bg: #0b0b0b;
      --text: #f4f0e8;
      --muted: rgba(244, 240, 232, 0.7);
      --border: rgba(244, 240, 232, 0.22);
      --font-display: 'Cormorant Garamond', serif;
      --font-ui: 'Syne', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 16% 12%, rgba(180, 107, 70, 0.26) 0, transparent 38%),
        radial-gradient(circle at 84% 84%, rgba(94, 115, 157, 0.22) 0, transparent 36%),
        var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      padding: 24px;
    }

    .thanks-card {
      width: min(620px, 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      background: rgba(10, 10, 10, 0.56);
      backdrop-filter: blur(8px);
      padding: 40px 34px;
      text-align: left;
    }

    .kicker {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(40px, 8vw, 72px);
      line-height: 0.95;
      font-weight: 400;
      margin-bottom: 18px;
    }

    p {
      max-width: 52ch;
      line-height: 1.75;
      color: var(--muted);
      margin-bottom: 26px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      padding: 10px 16px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 11px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.25s ease, border-color 0.25s ease;
    }

    .btn:hover {
      transform: translateX(4px);
      border-color: rgba(244, 240, 232, 0.5);
    }
  </style>
</head>
<body>
  <main class="thanks-card">
    <p class="kicker">Message Sent</p>
    <h1>Thank you.</h1>
    <p>Your message was sent successfully. I appreciate you reaching out, and I will get back to you soon.</p>
    <a class="btn" href="index.html#contact">Back to Portfolio ↗</a>
  </main>
</body>
</html>
